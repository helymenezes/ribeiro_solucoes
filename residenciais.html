<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Residenciais - Galeria</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; background:#f4f7fb; color:#0f172a; margin:0; }
    .container { max-width:900px; margin:32px auto; padding:16px; }
    header { display:flex; align-items:center; gap:16px; margin-bottom:24px; }
    .logo { width:44px; height:44px; border-radius:8px; background:#fff; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .logo img { width:36px; height:36px; object-fit:contain; }
    h1 { font-size:22px; margin:0; font-weight:700; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:18px; }
    .card { background:#fff; border-radius:14px; padding:12px; box-shadow:0 6px 18px rgba(12,13,16,0.06); cursor:pointer; border:1px solid #e6eef6; transition:transform .18s; }
    .card:hover { transform:scale(1.04); }
    .card img { width:100%; height:160px; object-fit:cover; border-radius:10px; }
    .lightbox { position:fixed; inset:0; background:rgba(2,6,23,0.85); display:flex; align-items:center; justify-content:center; z-index:999; opacity:0; pointer-events:none; transition:opacity .18s; }
    .lightbox.show { opacity:1; pointer-events:auto; }
    .lightbox img { max-width:92vw; max-height:82vh; border-radius:8px; box-shadow:0 12px 40px rgba(2,6,23,0.6); }
    .lb-close { position:fixed; top:24px; right:32px; background:#ef4444; color:#fff; border:none; border-radius:8px; padding:10px 18px; font-size:16px; cursor:pointer; }
    .loading { text-align:center; padding:40px; color:#64748b; font-size:16px; }
    .empty { text-align:center; padding:40px; color:#94a3b8; font-size:15px; }
    @media (max-width:600px){ .grid{grid-template-columns:1fr;} .card img{height:120px;} }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="img/logo.PNG" alt="Logo" />
      </div>
      <h1>Residenciais</h1>
    </header>
    <h2 style="margin-bottom:18px;">Galeria de Imagens</h2>
    <div class="grid" id="gallery">
      <div class="loading" id="loadingMsg">⏳ Carregando imagens...</div>
    </div>
    <a href="index.html" style="display:inline-block;margin-top:28px;color:#059669;font-weight:600;">← Voltar para página inicial</a>
  </div>
  <div class="lightbox" id="lightbox">
    <button class="lb-close" onclick="closeLightbox()">Fechar</button>
    <img id="lbImg" src="" alt="Imagem grande" />
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD_4F2TyECIrT_rvKaKkgn5MDNfaEgmvrk",
      authDomain: "my-ladingpage.firebaseapp.com",
      databaseURL: "https://my-ladingpage-default-rtdb.firebaseio.com",
      projectId: "my-ladingpage",
      storageBucket: "my-ladingpage.firebasestorage.app",
      messagingSenderId: "511615222539",
      appId: "1:511615222539:web:6d0b6597f96c1b6db4180e"
    };

    const GALLERY_TITLE = "Residenciais";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');

    async function loadGallery() {
      try {
        const snapshot = await get(ref(db, 'portfolio/services'));
        if (snapshot.exists()) {
          const services = Object.values(snapshot.val());
          const service = services.find(s => s.title === GALLERY_TITLE);

          gallery.innerHTML = '';

          if (service && service.images && service.images.length > 0) {
            service.images.forEach((dataURL, idx) => {
              const card = document.createElement('div');
              card.className = 'card';
              card.innerHTML = `<img src="${dataURL}" alt="${GALLERY_TITLE} ${idx + 1}">`;
              card.querySelector('img').onclick = () => {
                lbImg.src = dataURL;
                lightbox.classList.add('show');
              };
              gallery.appendChild(card);
            });
          } else {
            gallery.innerHTML = '<div class="empty">📷 Nenhuma imagem disponível nesta galeria.</div>';
          }
        } else {
          gallery.innerHTML = '<div class="empty">📷 Nenhuma imagem disponível.</div>';
        }
      } catch(e) {
        console.error('Erro ao carregar galeria:', e);
        try {
          const data = JSON.parse(localStorage.getItem('servicesData') || 'null');
          if (data) {
            const service = data.find(s => s.title === GALLERY_TITLE);
            gallery.innerHTML = '';
            if (service && service.images && service.images.length > 0) {
              service.images.forEach((dataURL, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${dataURL}" alt="${GALLERY_TITLE} ${idx + 1}">`;
                card.querySelector('img').onclick = () => {
                  lbImg.src = dataURL;
                  lightbox.classList.add('show');
                };
                gallery.appendChild(card);
              });
            } else {
              gallery.innerHTML = '<div class="empty">📷 Nenhuma imagem disponível.</div>';
            }
          } else {
            gallery.innerHTML = '<div class="empty">📷 Nenhuma imagem disponível.</div>';
          }
        } catch(e2) {
          gallery.innerHTML = '<div class="empty">❌ Erro ao carregar imagens.</div>';
        }
      }
    }

    window.closeLightbox = function() {
      lightbox.classList.remove('show');
      lbImg.src = '';
    };
    lightbox.onclick = function(e) { if (e.target === lightbox) window.closeLightbox(); };
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') window.closeLightbox(); });

    loadGallery();
  </script>
</body>
</html>
